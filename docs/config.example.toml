[hotkey]
trigger = "alt+space"
mode = "push_to_talk"

[stt]
provider = "groq"
language = "auto"

[llm]
provider = "deepseek"
# Default DeepSeek resmi: model = "deepseek-chat", base_url = "https://api.deepseek.com"
# Setup gateway opencode-go (OpenAI-compatible):
model = "deepseek-v4-flash-free"
base_url = "https://opencode.ai/zen/v1"
# API key disimpan via env DEEPSEEK_API_KEY atau Keychain: set_api_key("deepseek", "sk-...")
temperature = 0.7
max_history = 10

[tts]
provider = "elevenlabs"
voice_id = ""
speed = 1.0

[tools]
enabled = ["play_music", "pause_music", "open_app", "web_search", "open_url"]
spotify_client_id = ""
